<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Vision Pro Panorama Viewer</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(12, 18, 28, 0.78);
      --panel-border: rgba(255, 255, 255, 0.14);
      --button-bg: rgba(255, 255, 255, 0.14);
      --button-bg-hover: rgba(255, 255, 255, 0.24);
      --text-main: #f4f7fb;
      --text-muted: rgba(244, 247, 251, 0.78);
      --accent: #6fd3ff;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(18, 43, 61, 0.9), transparent 45%),
        linear-gradient(180deg, #071018 0%, #020409 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: relative;
    }

    #ui {
      position: fixed;
      inset: 16px auto auto 16px;
      z-index: 20;
      width: min(440px, calc(100vw - 32px));
      padding: 16px;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: var(--panel-bg);
      color: var(--text-main);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    #ui.hidden {
      display: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.2;
    }

    .metaRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .metaRow h1 {
      margin: 0;
    }

    .versionTag {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(111, 211, 255, 0.14);
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    p {
      margin: 0 0 12px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    input[type="file"] {
      width: 100%;
      color: var(--text-main);
      font-size: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--button-bg);
      color: var(--text-main);
      font-size: 14px;
      cursor: pointer;
      transition: background 120ms ease;
    }

    button:hover,
    button:focus-visible {
      background: var(--button-bg-hover);
      outline: none;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    #status strong {
      color: var(--accent);
      font-weight: 600;
    }

    #showUiButton {
      position: fixed;
      z-index: 15;
      right: 16px;
      bottom: 16px;
      display: none;
    }

    #showUiButton.visible {
      display: inline-flex;
    }

    #panoCanvas {
      display: none;
    }

    #previewFrame {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    #previewFrame.visible {
      display: block;
    }

    #previewFrame p {
      margin-bottom: 8px;
      font-size: 12px;
    }

    #debugPreview {
      display: block;
      width: 100%;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="metaRow">
      <h1>Vision Pro 360 Panorama Viewer</h1>
      <div class="versionTag" id="versionTag">v1.1.4</div>
    </div>
    <p>
      Load a local 2:1 equirectangular panorama such as 8192x4096. This page is
      designed for Safari on Apple Vision Pro and keeps the image local in the browser.
    </p>
    <div class="controls">
      <input id="fileInput" type="file" accept="image/jpeg,image/png,.jpg,.jpeg,.png" />
      <button id="demoButton" type="button">Load Demo Panorama</button>
      <button id="permissionButton" type="button">Request Motion Permission</button>
      <button id="resetViewButton" type="button">Reset View</button>
      <button id="xrButton" type="button">Enter XR / Immersive Mode</button>
      <button id="hideUiButton" type="button">Hide Controls</button>
    </div>
    <div id="status">
      <div><strong>Orientation:</strong> <span id="orientationStatus">Not checked</span></div>
      <div><strong>XR:</strong> <span id="xrStatus">Checking support...</span></div>
      <div><strong>Image:</strong> <span id="imageStatus">No panorama loaded</span></div>
    </div>
    <div id="previewFrame">
      <p>Loaded image preview:</p>
      <img id="debugPreview" alt="Loaded panorama preview" />
    </div>
  </div>

  <button id="showUiButton" type="button">Show Controls</button>
  <canvas id="panoCanvas"></canvas>
  <img id="xrSkyImage" alt="XR sky texture" hidden />

  <a-scene
    id="scene"
    embedded
    background="color: #000000"
    renderer="antialias: true; colorManagement: true"
    xr-mode-ui="enabled: false"
    webxr="optionalFeatures: local-floor, bounded-floor, hand-tracking; overlayElement: #ui"
  >
    <!--
      Vision Pro note:
      We use a live canvas texture for the normal preview because that path is reliable.
      We also prepare a frozen snapshot image separately so XR can try a more conservative
      texture handoff without breaking the preview renderer.
    -->
    <a-sky
      id="sky"
      radius="5000"
      rotation="0 -90 0"
      color="#111111"
      material="shader: flat"
    ></a-sky>

    <!--
      Vision Pro and Mobile Safari note:
      look-controls with magicWindowTrackingEnabled allows device/head orientation tracking
      when the browser exposes it. Some Apple platforms require a user gesture before
      DeviceOrientation data is available, which is why the permission button exists.
    -->
    <a-camera
      id="camera"
      position="0 1.6 0"
      look-controls="enabled: true; magicWindowTrackingEnabled: true; pointerLockEnabled: false; mouseEnabled: true; touchEnabled: true"
      wasd-controls="enabled: false"
    ></a-camera>
  </a-scene>

  <script>
    const fileInput = document.getElementById("fileInput");
    const demoButton = document.getElementById("demoButton");
    const permissionButton = document.getElementById("permissionButton");
    const resetViewButton = document.getElementById("resetViewButton");
    const xrButton = document.getElementById("xrButton");
    const hideUiButton = document.getElementById("hideUiButton");
    const showUiButton = document.getElementById("showUiButton");
    const orientationStatus = document.getElementById("orientationStatus");
    const xrStatus = document.getElementById("xrStatus");
    const imageStatus = document.getElementById("imageStatus");
    const ui = document.getElementById("ui");
    const scene = document.getElementById("scene");
    const sky = document.getElementById("sky");
    const cameraEl = document.getElementById("camera");
    const panoCanvas = document.getElementById("panoCanvas");
    const panoContext = panoCanvas.getContext("2d", { alpha: false });
    const xrSkyImage = document.getElementById("xrSkyImage");
    const versionTag = document.getElementById("versionTag");
    const previewFrame = document.getElementById("previewFrame");
    const debugPreview = document.getElementById("debugPreview");

    let currentImageElement = null;
    let currentPanoramaName = "";
    let maxTextureSize = 4096;
    let currentSkyDataUrl = null;
    let panoTexture = null;
    let isInXrMode = false;
    const APP_VERSION = "v1.1.4";

    function setOrientationStatus(message) {
      orientationStatus.textContent = message;
      console.log("[orientation]", message);
    }

    function setXrStatus(message) {
      xrStatus.textContent = message;
      console.log("[xr]", message);
    }

    function setImageStatus(message, isError) {
      imageStatus.textContent = message;
      console[isError ? "error" : "log"]("[image]", message);
    }

    function ensureCanvasTexture() {
      const mesh = sky.getObject3D("mesh");
      if (!mesh || !mesh.material) {
        console.warn("[image] Sky mesh is not ready yet");
        return false;
      }

      if (!panoTexture) {
        panoTexture = new THREE.CanvasTexture(panoCanvas);
        panoTexture.colorSpace = THREE.SRGBColorSpace;
        panoTexture.needsUpdate = true;
        mesh.material.map = panoTexture;
        mesh.material.color.set("#ffffff");
        mesh.material.toneMapped = false;
        mesh.material.needsUpdate = true;
        console.log("[image] Created direct CanvasTexture for sky");
      }

      return true;
    }

    function updatePreviewFromCanvas() {
      if (!ensureCanvasTexture()) {
        return;
      }

      sky.removeAttribute("src");
      panoTexture.needsUpdate = true;
      const mesh = sky.getObject3D("mesh");
      if (mesh && mesh.material) {
        mesh.material.map = panoTexture;
        mesh.material.color.set("#ffffff");
        mesh.material.needsUpdate = true;
      }

      console.log("[image] Updated live preview texture from canvas");
    }

    function updateXrSnapshotFromCanvas() {
      currentSkyDataUrl = panoCanvas.toDataURL("image/jpeg", 0.92);
      xrSkyImage.src = currentSkyDataUrl;
      console.log("[image] Prepared XR snapshot from canvas");
    }

    function applyXrSnapshotToSky() {
      if (!currentSkyDataUrl || !xrSkyImage.src) {
        console.log("[image] XR snapshot not ready yet");
        return;
      }

      const mesh = sky.getObject3D("mesh");
      if (mesh && mesh.material) {
        mesh.material.map = null;
        mesh.material.color.set("#ffffff");
        mesh.material.needsUpdate = true;
      }

      sky.setAttribute("material", "color", "#ffffff");
      sky.setAttribute("src", "#xrSkyImage");
      console.log("[image] Applied XR snapshot image element to sky");
    }

    function restorePreviewAfterXr() {
      sky.removeAttribute("src");
      if (currentImageElement) {
        renderPanoramaToCanvas(currentImageElement);
        window.setTimeout(() => {
          renderPanoramaToCanvas(currentImageElement);
          console.log("[image] Reapplied preview texture after XR exit settle");
        }, 100);
      }
    }

    function getSourceWidth(source) {
      return source.naturalWidth || source.videoWidth || source.width;
    }

    function getSourceHeight(source) {
      return source.naturalHeight || source.videoHeight || source.height;
    }

    function fitPanoramaToTextureLimit(width, height, limit) {
      const longestEdge = Math.max(width, height);
      if (longestEdge <= limit) {
        return { width, height, scaled: false };
      }

      const scale = limit / longestEdge;
      return {
        width: Math.max(2, Math.floor(width * scale)),
        height: Math.max(2, Math.floor(height * scale)),
        scaled: true
      };
    }

    function renderPanoramaToCanvas(image) {
      if (!ensureCanvasTexture()) {
        window.setTimeout(() => renderPanoramaToCanvas(image), 100);
        return;
      }

      const target = fitPanoramaToTextureLimit(
        getSourceWidth(image),
        getSourceHeight(image),
        maxTextureSize
      );

      panoCanvas.width = target.width;
      panoCanvas.height = target.height;
      panoContext.clearRect(0, 0, target.width, target.height);
      panoContext.save();
      panoContext.translate(target.width, 0);
      panoContext.scale(-1, 1);
      panoContext.drawImage(image, 0, 0, target.width, target.height);
      panoContext.restore();
      if (!isInXrMode) {
        updatePreviewFromCanvas();
      }
      updateXrSnapshotFromCanvas();

      if (target.scaled) {
        setImageStatus(
          "Loaded " +
            currentPanoramaName +
            " at " +
            getSourceWidth(image) +
            "x" +
            getSourceHeight(image) +
            ", scaled to " +
            target.width +
            "x" +
            target.height +
            " for device texture limits"
        );
      } else {
        setImageStatus(
          "Loaded " +
            currentPanoramaName +
            " at " +
            getSourceWidth(image) +
            "x" +
            getSourceHeight(image)
        );
      }
    }

    function showPreview(url) {
      debugPreview.src = url;
      previewFrame.classList.add("visible");
    }

    function loadPanoramaFromUrl(url, filename) {
      setImageStatus("Loading " + filename + "...");

      const image = new Image();
      currentPanoramaName = filename;

      image.onload = () => {
        currentImageElement = image;
        renderPanoramaToCanvas(image);
        showPreview(url);
      };

      image.onerror = () => {
        setImageStatus("Failed to decode image: " + filename, true);
      };

      image.src = url;
    }

    async function loadPanoramaFromFile(file) {
      currentPanoramaName = file.name;
      setImageStatus("Loading " + file.name + "...");
      const reader = new FileReader();

      reader.onerror = () => {
        setImageStatus("Failed to read file: " + file.name, true);
      };

      reader.onload = () => {
        console.log("[image] Loaded uploaded file as data URL");
        loadPanoramaFromUrl(reader.result, file.name);
      };

      reader.readAsDataURL(file);
    }

    async function checkXrAvailability() {
      if (!navigator.xr || !navigator.xr.isSessionSupported) {
        xrButton.disabled = true;
        setXrStatus("WebXR API not available in this browser");
        return;
      }

      try {
        const immersiveVrSupported = await navigator.xr.isSessionSupported("immersive-vr");
        if (immersiveVrSupported) {
          xrButton.disabled = false;
          setXrStatus("immersive-vr is supported");
          return;
        }

        xrButton.disabled = true;
        setXrStatus("WebXR present, but immersive-vr is not supported");
      } catch (error) {
        xrButton.disabled = true;
        setXrStatus("Failed to query XR support: " + error.message);
      }
    }

    async function requestOrientationPermission() {
      if (typeof DeviceOrientationEvent === "undefined") {
        setOrientationStatus("DeviceOrientationEvent is not available");
        return;
      }

      if (typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
          const result = await DeviceOrientationEvent.requestPermission();
          setOrientationStatus("Permission request result: " + result);
        } catch (error) {
          setOrientationStatus("Permission request failed: " + error.message);
        }
        return;
      }

      setOrientationStatus("Explicit permission request not required on this browser");
    }

    function detectMaxTextureSize() {
      const renderer =
        scene.renderer ||
        (scene.canvas && (scene.canvas.getContext("webgl2") || scene.canvas.getContext("webgl")));

      const gl =
        renderer && renderer.getContext ? renderer.getContext() : renderer;

      if (gl) {
        maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE) || maxTextureSize;
      }

      console.log("[image] MAX_TEXTURE_SIZE =", maxTextureSize);
    }

    function resetView() {
      if (cameraEl.object3D) {
        cameraEl.object3D.rotation.set(0, 0, 0);
        cameraEl.object3D.position.set(0, 1.6, 0);
      }

      const lookControls = cameraEl.components["look-controls"];
      if (lookControls) {
        if (lookControls.pitchObject) {
          lookControls.pitchObject.rotation.x = 0;
        }
        if (lookControls.yawObject) {
          lookControls.yawObject.rotation.y = 0;
          lookControls.yawObject.rotation.z = 0;
        }
        if (typeof lookControls.updateOrientation === "function") {
          lookControls.updateOrientation();
        }
      }

      setOrientationStatus("View reset to forward horizon");
      console.log("[orientation] Reset view requested");
    }

    function hideUi() {
      ui.classList.add("hidden");
      showUiButton.classList.add("visible");
    }

    function showUi() {
      ui.classList.remove("hidden");
      showUiButton.classList.remove("visible");
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        return;
      }

      const lowerName = file.name.toLowerCase();
      const isSupportedImage =
        ["image/jpeg", "image/png"].includes(file.type) ||
        lowerName.endsWith(".jpg") ||
        lowerName.endsWith(".jpeg") ||
        lowerName.endsWith(".png");

      if (!isSupportedImage) {
        setImageStatus("Unsupported file type: " + (file.type || "unknown"), true);
        return;
      }

      loadPanoramaFromFile(file);
    });

    demoButton.addEventListener("click", () => {
      loadPanoramaFromUrl("./demo-panorama.png", "demo-panorama.png");
    });

    permissionButton.addEventListener("click", requestOrientationPermission);
    resetViewButton.addEventListener("click", resetView);

    xrButton.addEventListener("click", async () => {
      try {
        await scene.enterVR();
        setXrStatus("Requested XR / immersive mode");
      } catch (error) {
        setXrStatus("Failed to enter XR mode: " + error.message);
      }
    });

    hideUiButton.addEventListener("click", hideUi);
    showUiButton.addEventListener("click", showUi);

    scene.addEventListener("enter-vr", () => {
      isInXrMode = true;
      setXrStatus("Scene entered XR / immersive mode");
      if (currentSkyDataUrl) {
        applyXrSnapshotToSky();
      }
      if (currentImageElement) {
        window.setTimeout(() => {
          if (currentSkyDataUrl) {
            applyXrSnapshotToSky();
            console.log("[image] Reapplied frozen XR snapshot after settle");
          }
        }, 250);
      } else {
        console.log("[image] No panorama selected when entering XR");
      }
    });

    scene.addEventListener("exit-vr", () => {
      isInXrMode = false;
      setXrStatus("Scene exited XR / immersive mode");
      restorePreviewAfterXr();
    });

    window.addEventListener("resize", () => {
      console.log("[orientation] Window resized");
    });

    setOrientationStatus("Awaiting user action");
    versionTag.textContent = APP_VERSION;
    console.log("[app] Version", APP_VERSION);
    scene.addEventListener("loaded", detectMaxTextureSize, { once: true });
    sky.addEventListener("loaded", ensureCanvasTexture, { once: true });
    checkXrAvailability();
  </script>
</body>
</html>
